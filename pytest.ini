[pytest]
# Pytest configuration for MOSAIC project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude legacy folders from test collection
norecursedirs =
    .git
    .venv
    __pycache__
    *.egg-info
    build
    dist
    cleanrl
    LeanRL
    openrlbenchmark
    CORL

# Test path configuration
testpaths =
    gym_gui/tests
    # Worker tests (subprocess workers)
    3rd_party/balrog_worker/tests
    3rd_party/cleanrl_worker/tests
    3rd_party/mosaic/human_worker/tests
    3rd_party/mosaic/llm_worker/tests
    3rd_party/mosaic/random_worker/tests
    3rd_party/ray_worker/tests
    3rd_party/xuance_worker/tests

# Output options
addopts =
    --import-mode=importlib
    --strict-markers
    --tb=short
    -ra

# Timeout: prevent tests from hanging indefinitely (seconds)
timeout = 600

# Async support
asyncio_mode = auto
markers =
    asyncio: marks tests that require an asyncio event loop
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests (require running services)
    benchmark: marks benchmark tests (performance measurement)
