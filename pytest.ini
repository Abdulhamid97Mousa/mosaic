[pytest]
# Pytest configuration for MOSAIC project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude legacy folders from test collection
norecursedirs =
    .git
    .venv
    __pycache__
    *.egg-info
    build
    dist
    cleanrl
    LeanRL
    openrlbenchmark
    CORL

# Test path configuration (core GUI tests only)
# 3rd-party worker tests require optional deps not in [dev] extras;
# run them locally with the full environment installed.
# Use `make test-workers` to run random_worker tests separately.
testpaths =
    gym_gui/tests

# Output options
addopts =
    --import-mode=importlib
    --strict-markers
    --tb=short
    -ra

# Timeout: prevent tests from hanging indefinitely (seconds)
timeout = 600

# Async support
asyncio_mode = auto
markers =
    asyncio: marks tests that require an asyncio event loop
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests (require running services)
    benchmark: marks benchmark tests (performance measurement)
    gui: marks tests that require a full GUI environment (skipped in CI)
